    R5:
      kind: ceos
      image: ceos:4.32.0F
    R6:
      kind: cisco_xrd
      image: xrd:7.11.2
    R8:
      kind: juniper_vjunosrouter
      image: vrnetlab/vr-vjunosrouter:23.2R1.15
  links:
          - endpoints: ["R5:eth2", "R6:Gi0-0-0-2"]
